name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: Describe the problem or limitation...
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Behavior
      description: How should the feature work?
      placeholder: Describe the desired behavior...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Hardware/Software Context
      description: Any relevant hardware or software details (audio interface, GPU, backend, etc.).
      placeholder: e.g. This would benefit users with RTX GPUs running PipeWire...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you have considered or workarounds you currently use.
      placeholder: Describe alternatives...
    validations:
      required: false
