name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    name: Build & Test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev pkg-config

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (no default features)
        run: cargo clippy --no-default-features

      - name: Clippy (with ghostwave)
        run: cargo clippy --features ghostwave

      - name: Build
        run: cargo build --features ghostwave

      - name: Test
        run: cargo test --features ghostwave
