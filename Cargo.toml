[package]
name = "phantomlink"
version = "0.2.0"
edition = "2024"

[dependencies]
eframe = "0.27"
dirs = "5"
alsa = "0.7"
cpal = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
nnnoiseless = "0.5"
anyhow = "1.0"
vst = "0.3"
libloading = "0.8"
jack = "0.12"
crossbeam-channel = "0.5"
realfft = "3.3"
num-complex = "0.4"
rand = "0.8"
glam = "0.24"
log = "0.4"

# Ghostwave integration for RTX noise suppression
# Note: Currently has build issues, integrating as optional feature
# ghostwave-core = { git = "https://github.com/ghostkellz/ghostwave", features = ["pipewire-backend", "alsa-backend"], optional = true }

[features]
default = []
ghostwave = []  # Feature flag for Ghostwave integration when it's ready

